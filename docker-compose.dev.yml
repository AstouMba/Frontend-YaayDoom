services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_BASE_URL: http://localhost:8010/api
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
